<svg width="400" height="90" viewBox="0 0 400 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      font-weight: 800;
      font-size: 24px;
      animation: glow 3s ease-in-out infinite alternate;
    }
    .subtext {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      font-style: italic;
      font-weight: 500;
      font-size: 13px;
      fill: #64748b;
    }
    @keyframes glow {
      from {
        text-shadow: 0 0 4px rgba(124, 58, 237, 0.2), 0 0 10px rgba(124, 58, 237, 0.4);
        fill: #7c3aed;
      }
      to {
        text-shadow: 0 0 12px rgba(192, 132, 252, 0.6), 0 0 22px rgba(192, 132, 252, 0.8);
        fill: #c084fc;
      }
    }
  </style>
  <text x="50%" y="40" dominant-baseline="middle" text-anchor="middle" class="text">🔮 DOCINTEL RAG AGENT</text>
  <text x="50%" y="68" dominant-baseline="middle" text-anchor="middle" class="subtext">Secure Ingestion, Multimodal OCR &amp; Agentic RAG</text>
</svg>
